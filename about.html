        /* CSS 핵심: brutlatist-avantgarde + kr-raw-concrete 테마 */
        :root {
            --bg: #f5f0eb;
            --text: #1a1a1a;
            --accent: #d32f2f;
            --accent2: #212121;
            --border: 4px solid #1a1a1a;

            background: var(--accent2);
            color: #fff;

            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: var(--font-header);
            text-transform: uppercase;
            font-size: 1.2rem;
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1000;
        }
        .menu-toggle::before {
            content: '☰';
        }
        .nav-open .menu-toggle::before {
            content: '✕';
        }
        .nav-open .nav-list {
            display: flex !important;
        }
        @media (max-width: 768px) {
            .menu-toggle {

            }
            .nav-list {

                flex-direction: column;
                background: var(--bg);
